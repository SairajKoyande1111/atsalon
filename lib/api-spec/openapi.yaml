openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Salon Billing Software API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer management
  - name: services
    description: Service catalog
  - name: products
    description: Product catalog
  - name: staff
    description: Staff management
  - name: appointments
    description: Appointment scheduling
  - name: bills
    description: Billing and POS
  - name: inventory
    description: Inventory management
  - name: memberships
    description: Membership packages
  - name: reports
    description: Reports and analytics
  - name: expenses
    description: Expense tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"
    post:
      operationId: createService
      tags: [services]
      summary: Create a new service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    put:
      operationId: updateService
      tags: [services]
      summary: Update service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "200":
          description: Service updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Service deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffListResponse"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a new staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}:
    get:
      operationId: getStaff
      tags: [staff]
      summary: Get staff details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffDetail"
    put:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "200":
          description: Staff updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: staffId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentRequest"
      responses:
        "200":
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List bills
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: customerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillListResponse"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a new bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillRequest"
      responses:
        "201":
          description: Bill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get bill details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /memberships:
    get:
      operationId: listMemberships
      tags: [memberships]
      summary: List membership packages
      responses:
        "200":
          description: List of memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipListResponse"
    post:
      operationId: createMembership
      tags: [memberships]
      summary: Create a membership package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipRequest"
      responses:
        "201":
          description: Membership created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseRequest"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /reports/dashboard:
    get:
      operationId: getDashboardStats
      tags: [reports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Get revenue report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        membershipType:
          type: string
          nullable: true
        loyaltyPoints:
          type: integer
        totalVisits:
          type: integer
        totalSpend:
          type: number
        lastVisit:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, phone, loyaltyPoints, totalVisits, totalSpend, createdAt]

    CustomerDetail:
      allOf:
        - $ref: "#/components/schemas/Customer"
        - type: object
          properties:
            bills:
              type: array
              items:
                $ref: "#/components/schemas/BillSummary"
          required: [bills]

    CustomerListResponse:
      type: object
      properties:
        customers:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [customers, total, page, limit]

    CreateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name, phone]

    UpdateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        membershipType:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    Service:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
        duration:
          type: integer
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
      required: [id, name, category, price, duration, isActive]

    ServiceListResponse:
      type: object
      properties:
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
        categories:
          type: array
          items:
            type: string
      required: [services, categories]

    CreateServiceRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        duration:
          type: integer
        description:
          type: string
          nullable: true
      required: [name, category, price, duration]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        stockQuantity:
          type: integer
        reorderLevel:
          type: integer
        costPrice:
          type: number
        sellingPrice:
          type: number
        supplier:
          type: string
          nullable: true
        isLowStock:
          type: boolean
      required: [id, name, brand, category, stockQuantity, reorderLevel, costPrice, sellingPrice, isLowStock]

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
      required: [products, total]

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        stockQuantity:
          type: integer
        reorderLevel:
          type: integer
        costPrice:
          type: number
        sellingPrice:
          type: number
        supplier:
          type: string
          nullable: true
      required: [name, brand, category, stockQuantity, reorderLevel, costPrice, sellingPrice]

    Staff:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        specialization:
          type: string
        commissionPercent:
          type: number
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        isActive:
          type: boolean
        workingHours:
          type: string
          nullable: true
        avatarInitials:
          type: string
      required: [id, name, specialization, commissionPercent, isActive, avatarInitials]

    StaffDetail:
      allOf:
        - $ref: "#/components/schemas/Staff"
        - type: object
          properties:
            servicesPerformed:
              type: integer
            revenueGenerated:
              type: number
            tips:
              type: number
          required: [servicesPerformed, revenueGenerated, tips]

    StaffListResponse:
      type: object
      properties:
        staff:
          type: array
          items:
            $ref: "#/components/schemas/Staff"
      required: [staff]

    CreateStaffRequest:
      type: object
      properties:
        name:
          type: string
        specialization:
          type: string
        commissionPercent:
          type: number
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        workingHours:
          type: string
          nullable: true
      required: [name, specialization, commissionPercent]

    Appointment:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        staffId:
          type: integer
        staffName:
          type: string
        serviceId:
          type: integer
        serviceName:
          type: string
        serviceCategory:
          type: string
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        duration:
          type: integer
        status:
          type: string
          enum: [scheduled, confirmed, in-progress, completed, cancelled]
        notes:
          type: string
          nullable: true
      required: [id, customerId, customerName, customerPhone, staffId, staffName, serviceId, serviceName, serviceCategory, appointmentDate, appointmentTime, duration, status]

    AppointmentListResponse:
      type: object
      properties:
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required: [appointments]

    CreateAppointmentRequest:
      type: object
      properties:
        customerId:
          type: integer
        staffId:
          type: integer
        serviceId:
          type: integer
        appointmentDate:
          type: string
        appointmentTime:
          type: string
        notes:
          type: string
          nullable: true
      required: [customerId, staffId, serviceId, appointmentDate, appointmentTime]

    UpdateAppointmentRequest:
      type: object
      properties:
        status:
          type: string
          enum: [scheduled, confirmed, in-progress, completed, cancelled]
        notes:
          type: string
          nullable: true

    BillItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [service, product]
        itemId:
          type: integer
        name:
          type: string
        staffId:
          type: integer
          nullable: true
        staffName:
          type: string
          nullable: true
        price:
          type: number
        quantity:
          type: integer
        discount:
          type: number
        total:
          type: number
      required: [id, type, itemId, name, price, quantity, discount, total]

    Bill:
      type: object
      properties:
        id:
          type: integer
        billNumber:
          type: string
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        customerPhone:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/BillItem"
        subtotal:
          type: number
        discountAmount:
          type: number
        taxAmount:
          type: number
        taxPercent:
          type: number
        finalAmount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, upi, card, wallet]
        couponCode:
          type: string
          nullable: true
        loyaltyPointsUsed:
          type: integer
        status:
          type: string
          enum: [draft, paid, cancelled]
        createdAt:
          type: string
      required: [id, billNumber, items, subtotal, discountAmount, taxAmount, taxPercent, finalAmount, paymentMethod, loyaltyPointsUsed, status, createdAt]

    BillSummary:
      type: object
      properties:
        id:
          type: integer
        billNumber:
          type: string
        finalAmount:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, billNumber, finalAmount, paymentMethod, status, createdAt]

    BillListResponse:
      type: object
      properties:
        bills:
          type: array
          items:
            $ref: "#/components/schemas/Bill"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [bills, total, page, limit]

    CreateBillRequest:
      type: object
      properties:
        customerId:
          type: integer
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [service, product]
              itemId:
                type: integer
              staffId:
                type: integer
                nullable: true
              quantity:
                type: integer
              discount:
                type: number
            required: [type, itemId, quantity, discount]
        taxPercent:
          type: number
        paymentMethod:
          type: string
          enum: [cash, upi, card, wallet]
        couponCode:
          type: string
          nullable: true
        loyaltyPointsUsed:
          type: integer
        discountAmount:
          type: number
      required: [items, taxPercent, paymentMethod, loyaltyPointsUsed, discountAmount]

    Membership:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        duration:
          type: integer
        benefits:
          type: string
        discountPercent:
          type: number
        isActive:
          type: boolean
      required: [id, name, price, duration, benefits, discountPercent, isActive]

    MembershipListResponse:
      type: object
      properties:
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
      required: [memberships]

    CreateMembershipRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        duration:
          type: integer
        benefits:
          type: string
        discountPercent:
          type: number
      required: [name, price, duration, benefits, discountPercent]

    Expense:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        date:
          type: string
        createdAt:
          type: string
      required: [id, category, description, amount, date, createdAt]

    ExpenseListResponse:
      type: object
      properties:
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        total:
          type: number
      required: [expenses, total]

    CreateExpenseRequest:
      type: object
      properties:
        category:
          type: string
        description:
          type: string
        amount:
          type: number
        date:
          type: string
      required: [category, description, amount, date]

    DashboardStats:
      type: object
      properties:
        todayRevenue:
          type: number
        todayBills:
          type: integer
        todayCustomers:
          type: integer
        totalCustomers:
          type: integer
        monthRevenue:
          type: number
        monthBills:
          type: integer
        pendingAppointments:
          type: integer
        lowStockCount:
          type: integer
        topServices:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
              revenue:
                type: number
            required: [name, count, revenue]
        topStaff:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              revenue:
                type: number
              services:
                type: integer
            required: [name, revenue, services]
        recentBills:
          type: array
          items:
            $ref: "#/components/schemas/BillSummary"
      required: [todayRevenue, todayBills, todayCustomers, totalCustomers, monthRevenue, monthBills, pendingAppointments, lowStockCount, topServices, topStaff, recentBills]

    RevenueReport:
      type: object
      properties:
        period:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
